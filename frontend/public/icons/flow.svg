<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <g
    stroke="currentColor"
    stroke-width="1"
    fill="none"
    stroke-linecap="round"
    stroke-linejoin="round"
  >
    <!-- Horizontal flow lines -->
    <path d="M20 50 H180" />
    <path d="M20 100 H180" />
    <path d="M20 150 H180" />
  </g>

  <!-- Nodes -->
  <g fill="currentColor">
    <circle cx="20" cy="50" r="3" />
    <circle cx="180" cy="100" r="3" />
    <circle cx="20" cy="150" r="3" />
  </g>
</svg>